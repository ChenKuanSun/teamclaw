<div class="skills-container">
  <div class="header">
    <h2>Skills</h2>
  </div>

  @if (loading()) {
    <div class="spinner-wrapper">
      <mat-progress-spinner mode="indeterminate" diameter="48" />
    </div>
  } @else {
    <mat-card>
      <table mat-table [dataSource]="skills()" class="full-width">
        <ng-container matColumnDef="emoji">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let s">{{ s.emoji }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let s">{{ s.name }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let s">{{ s.description }}</td>
        </ng-container>

        <ng-container matColumnDef="source">
          <th mat-header-cell *matHeaderCellDef>Source</th>
          <td mat-cell *matCellDef="let s">
            @if (s.source === 'bundled') {
              <mat-chip>Bundled</mat-chip>
            } @else {
              <mat-chip>Upstream</mat-chip>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let s">
            @if (s.enabled && s.hasCredentials) {
              <mat-chip highlighted>Active</mat-chip>
            } @else if (s.enabled) {
              <mat-chip>No Key</mat-chip>
            } @else {
              <mat-chip>Disabled</mat-chip>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let s">
            <button mat-icon-button (click)="openIntegration(s)">
              <mat-icon>chevron_right</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="clickable-row"
          (click)="openIntegration(row)"></tr>
      </table>
    </mat-card>
  }
</div>
