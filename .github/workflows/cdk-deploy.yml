name: CDK Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        options:
          - dev
          - prod
      stack:
        description: Stack to deploy
        type: choice
        options:
          - teamclaw-foundation-infra
          - teamclaw-cluster-infra
          - teamclaw-control-plane-infra
          - teamclaw-admin-infra
          - all

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy stack
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOY_STACK: ${{ inputs.stack }}
        run: |
          if [ "$DEPLOY_STACK" = "all" ]; then
            DEPLOY_ENV=${{ inputs.environment }} npx nx run-many -t deploy -c ${{ inputs.environment }}
          else
            npx nx run "$DEPLOY_STACK:deploy:${{ inputs.environment }}"
          fi
