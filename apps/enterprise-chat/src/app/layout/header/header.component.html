<mat-toolbar class="tc-global-bar">
  <span class="tc-page-label">{{ currentPageLabel() }}</span>

  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-info-button">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item (click)="signOut()">
      <mat-icon>logout</mat-icon>
      <span>Sign Out</span>
    </button>
  </mat-menu>
</mat-toolbar>
