version: 1
applications:
  - appRoot: apps/enterprise-chat
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22.15.0
            - nvm use 22.15.0
            - cd ../..
            - npm ci --legacy-peer-deps
        build:
          commands:
            - if [ "${AWS_BRANCH}" = "main" ]; then npx nx run
              enterprise-chat:build:production --verbose; fi
            - if [ "${AWS_BRANCH}" = "dev" ]; then npx nx run
              enterprise-chat:build:development --verbose; fi
      artifacts:
        baseDirectory: ../../dist/apps/enterprise-chat/browser/
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

  - appRoot: apps/enterprise-admin
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22.15.0
            - nvm use 22.15.0
            - cd ../..
            - npm ci --legacy-peer-deps
        build:
          commands:
            - if [ "${AWS_BRANCH}" = "main" ]; then npx nx run
              enterprise-admin:build:production --verbose; fi
            - if [ "${AWS_BRANCH}" = "dev" ]; then npx nx run
              enterprise-admin:build:development --verbose; fi
      artifacts:
        baseDirectory: ../../dist/apps/enterprise-admin/browser/
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
