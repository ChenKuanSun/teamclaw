<div class="integrations-container">
  <div class="header">
    <h2>Integrations</h2>
  </div>

  @if (loading()) {
    <div class="spinner-wrapper">
      <mat-progress-spinner mode="indeterminate" diameter="48" />
    </div>
  } @else {
    <mat-card>
      <table mat-table [dataSource]="integrations()" class="full-width">
        <ng-container matColumnDef="icon">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let i">
            <mat-icon>{{ i.icon }}</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let i">{{ i.displayName }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let i">{{ i.description }}</td>
        </ng-container>

        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let i">{{ i.category }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let i">
            @if (i.enabled && i.hasCredentials) {
              <mat-chip highlighted>Active</mat-chip>
            } @else if (i.enabled) {
              <mat-chip>No Key</mat-chip>
            } @else {
              <mat-chip>Disabled</mat-chip>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let i">
            <button mat-icon-button (click)="openDetail(i)">
              <mat-icon>chevron_right</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="clickable-row"
          (click)="openDetail(row)"></tr>
      </table>
    </mat-card>
  }
</div>
